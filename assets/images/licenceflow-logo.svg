<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40" fill="none">
  <!-- Background circle -->
  <circle cx="20" cy="20" r="20" fill="#1A2B4A"/>
  <!-- Key body -->
  <circle cx="14" cy="20" r="5" stroke="#00C4B4" stroke-width="2.2" fill="none"/>
  <!-- Key shaft -->
  <line x1="19" y1="20" x2="30" y2="20" stroke="#00C4B4" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Key teeth -->
  <line x1="27" y1="20" x2="27" y2="23" stroke="#00C4B4" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="20" x2="24" y2="22" stroke="#00C4B4" stroke-width="2" stroke-linecap="round"/>
  <!-- Flow arrow -->
  <polyline points="28,15 32,20 28,25" stroke="#00C4B4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5"/>
</svg>
